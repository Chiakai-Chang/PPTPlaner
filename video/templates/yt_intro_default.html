<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    background: linear-gradient(135deg, #0D1B2A 0%, #1B2838 50%, #16213E 100%);
    font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .logo-container {
    position: absolute;
    top: 60px;
    left: 60px;
  }
  .logo-container img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
  }
  .channel-name {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    margin-bottom: 20px;
    text-align: center;
  }
  .tagline {
    font-size: 32px;
    color: #64B5F6;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 40px;
    text-align: center;
  }
  .video-title {
    font-size: 42px;
    color: rgba(255,255,255,0.8);
    font-weight: 400;
    text-align: center;
    max-width: 1400px;
    line-height: 1.4;
  }
  .divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #64B5F6, transparent);
    margin: 30px 0;
  }
</style>
</head>
<body>
  {% if logo_path %}
  <div class="logo-container">
    <img src="{{ logo_path }}" alt="Channel Logo">
  </div>
  {% endif %}

  <div class="channel-name">{{ channel_name }}</div>

  <div class="divider"></div>

  {% if tagline %}
  <div class="tagline">{{ tagline }}</div>
  {% endif %}

  {% if video_title %}
  <div class="video-title">{{ video_title }}</div>
  {% endif %}
</body>
</html>
