<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    background: linear-gradient(135deg, #0D1B2A 0%, #1B2838 50%, #16213E 100%);
    font-family: system-ui, -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .header {
    font-size: 64px;
    font-weight: 700;
    margin-bottom: 50px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .cta-text {
    font-size: 36px;
    color: rgba(255,255,255,0.9);
    text-align: center;
    max-width: 1200px;
    line-height: 1.5;
    margin-bottom: 40px;
  }
  .subscribe-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: #FF0000;
    color: #FFFFFF;
    font-size: 32px;
    font-weight: 600;
    padding: 16px 40px;
    border-radius: 50px;
    text-decoration: none;
    margin-bottom: 40px;
    box-shadow: 0 6px 20px rgba(255,0,0,0.3);
  }
  .subscribe-btn .arrow {
    font-size: 28px;
  }
  .next-video {
    font-size: 28px;
    color: #64B5F6;
    text-align: center;
    margin-bottom: 60px;
  }
  .channel-name {
    position: absolute;
    bottom: 60px;
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .divider {
    width: 150px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #64B5F6, transparent);
    margin-bottom: 40px;
  }
</style>
</head>
<body>
  <div class="header">感謝收看</div>

  <div class="divider"></div>

  {% if cta_text %}
  <div class="cta-text">{{ cta_text }}</div>
  {% endif %}

  {% if subscribe_hint %}
  <div class="subscribe-btn">
    <span class="arrow">▶</span>
    <span>訂閱</span>
  </div>
  {% endif %}

  {% if next_video_text %}
  <div class="next-video">下一集：{{ next_video_text }}</div>
  {% endif %}

  <div class="channel-name">{{ channel_name }}</div>
</body>
</html>
